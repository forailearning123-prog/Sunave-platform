<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Goal - Sunave AI OS</title>
  <meta name="description" content="Create a new strategic goal.">
  <link rel="stylesheet" href="/assets/css/styles.css">
  <link rel="stylesheet" href="/assets/css/dashboard.css">
  <style>
    .split-layout { display: flex; gap: 2rem; flex-wrap: wrap; }
    .split-form { flex: 3; min-width: 300px; }
    .split-preview { flex: 2; min-width: 300px; position: sticky; top: 80px; align-self: flex-start; }
    .form-section { background: var(--dash-surface); border: 1px solid var(--dash-border); border-radius: var(--dash-radius); padding: 1.5rem; margin-bottom: 1.5rem; }
  </style>
</head>
<body class="dash-root">
  <div class="dash-shell">
    <header class="dash-header">
      <a href="/dashboard" class="dash-header-logo">
        <div class="dash-header-logo-mark">S</div>
        Sunave AI
      </a>
      <div class="dash-header-divider"></div>
      <div class="dash-header-actions">
        <button class="dash-user-btn" aria-label="User Menu">
          <div class="dash-avatar">U</div>
          <span class="dash-user-name">User</span>
        </button>
      </div>
    </header>
    <div class="dash-body">
      <aside class="dash-sidebar">
        <nav class="dash-nav">
          <div class="dash-nav-section-label">Platform</div>
          <a href="/dashboard" class="dash-nav-item"><span class="dash-nav-icon">📊</span>Dashboard</a>
          <a href="/goals" class="dash-nav-item active"><span class="dash-nav-icon">🎯</span>Goals</a>
          <a href="/projects" class="dash-nav-item"><span class="dash-nav-icon">📁</span>Projects</a>
          <a href="/tasks" class="dash-nav-item"><span class="dash-nav-icon">✓</span>Tasks</a>
          <a href="/timeline" class="dash-nav-item"><span class="dash-nav-icon">📅</span>Timeline</a>
        </nav>
      </aside>
      <main class="dash-main">
        <div class="dash-page-header">
          <div>
            <div style="font-size:0.75rem; color:var(--dash-text-muted); margin-bottom:0.25rem;"><a href="/goals" style="color:inherit; text-decoration:none;">Goals</a> &rsaquo; New Goal</div>
            <h1 class="dash-page-title">Create New Goal</h1>
          </div>
        </div>
        
        <form id="goalForm" class="split-layout">
          <div class="split-form">
            
            <div class="form-section">
              <h3 class="dash-section-label">Basic Info</h3>
              <div class="dash-form-group">
                <label class="dash-label">Goal Title *</label>
                <input type="text" id="gTitle" class="dash-input" required placeholder="e.g. Increase Annual Revenue 30%">
              </div>
              <div class="dash-form-group">
                <label class="dash-label">Description</label>
                <textarea id="gDesc" class="dash-textarea" placeholder="Detail the objectives and why this matters..."></textarea>
              </div>
            </div>

            <div class="form-section">
              <h3 class="dash-section-label">Classification</h3>
              <div style="display:flex; gap:1rem; flex-wrap:wrap;">
                <div class="dash-form-group" style="flex:1;">
                  <label class="dash-label">Category</label>
                  <select id="gCat" class="dash-select">
                    <option value="business">Business</option>
                    <option value="technology">Technology</option>
                    <option value="operations">Operations</option>
                    <option value="hr">HR</option>
                    <option value="customer">Customer</option>
                  </select>
                </div>
                <div class="dash-form-group" style="flex:1;">
                  <label class="dash-label">Status</label>
                  <select id="gStat" class="dash-select">
                    <option value="draft">Draft</option>
                    <option value="planning">Planning</option>
                    <option value="active" selected>Active</option>
                  </select>
                </div>
                <div class="dash-form-group" style="flex:1;">
                  <label class="dash-label">Priority</label>
                  <select id="gPri" class="dash-select">
                    <option value="high">High</option>
                    <option value="medium" selected>Medium</option>
                    <option value="low">Low</option>
                  </select>
                </div>
              </div>
            </div>

            <div class="form-section">
              <h3 class="dash-section-label">Ownership & Dates</h3>
              <div style="display:flex; gap:1rem; flex-wrap:wrap;">
                <div class="dash-form-group" style="flex:1;">
                  <label class="dash-label">Owner</label>
                  <select id="gOwner" class="dash-select">
                    <option>Sarah Chen</option>
                    <option>James Park</option>
                    <option>Priya Nair</option>
                    <option>Mike Torres</option>
                  </select>
                </div>
                <div class="dash-form-group" style="flex:1;">
                  <label class="dash-label">Target Date</label>
                  <input type="date" id="gDate" class="dash-input">
                </div>
              </div>
            </div>

            <div style="display:flex; gap:1rem;">
              <button type="submit" class="dash-btn dash-btn-primary">Create Goal</button>
              <a href="/goals" class="dash-btn dash-btn-ghost">Cancel</a>
            </div>

          </div>

          <div class="split-preview">
            <h3 class="dash-section-label">Live Preview</h3>
            <div class="goal-card" style="pointer-events:none;">
              <div class="goal-card-header">
                <div class="goal-card-icon">🎯</div>
                <div class="goal-card-title" id="prevTitle">New Goal Title</div>
              </div>
              <div class="goal-card-meta">
                <span class="dash-tag dash-tag-muted" id="prevCat">business</span>
                <span class="status-badge status-active" id="prevStat">active</span>
              </div>
              <div class="goal-card-meta" style="margin-top: auto; border-top: 1px solid var(--dash-border); padding-top: 0.75rem;">
                <span style="font-size: 0.75rem; color: var(--dash-text-muted);" id="prevOwner">Sarah Chen</span>
                <span class="goal-card-dates" id="prevDate">Target: Not set</span>
              </div>
            </div>
          </div>
        </form>

      </main>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const gTitle = document.getElementById('gTitle');
      const gCat = document.getElementById('gCat');
      const gStat = document.getElementById('gStat');
      const gOwner = document.getElementById('gOwner');
      const gDate = document.getElementById('gDate');

      const prevTitle = document.getElementById('prevTitle');
      const prevCat = document.getElementById('prevCat');
      const prevStat = document.getElementById('prevStat');
      const prevOwner = document.getElementById('prevOwner');
      const prevDate = document.getElementById('prevDate');

      function updatePreview() {
        prevTitle.textContent = gTitle.value || 'New Goal Title';
        prevCat.textContent = gCat.value;
        prevStat.textContent = gStat.value;
        prevStat.className = 'status-badge status-' + gStat.value;
        prevOwner.textContent = gOwner.options[gOwner.selectedIndex].text;
        prevDate.textContent = gDate.value ? 'Target: ' + gDate.value : 'Target: Not set';
      }

      gTitle.addEventListener('input', updatePreview);
      gCat.addEventListener('change', updatePreview);
      gStat.addEventListener('change', updatePreview);
      gOwner.addEventListener('change', updatePreview);
      gDate.addEventListener('change', updatePreview);

      document.getElementById('goalForm').addEventListener('submit', (e) => {
        e.preventDefault();
        alert('Goal Created Successfully!');
        window.location.href = '/goals';
      });
    });
  </script>
</body>
</html>
