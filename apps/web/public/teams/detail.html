<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Team Detail - Sunave</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div class="container wide">
      <div style="display:flex;align-items:center;gap:1rem;margin-bottom:1rem;">
        <a href="/teams">← Teams</a>
      </div>

      <div id="team-header"><p class="helper">Loading…</p></div>

      <div id="team-body" style="display:none;">
        <h2>Edit Team</h2>
        <form id="edit-form" style="max-width:480px;">
          <label>Name</label>
          <input type="text" name="name" required />
          <label>Description</label>
          <input type="text" name="description" />
          <label>Color (hex)</label>
          <input type="text" name="color" />
          <div style="display:flex;gap:0.75rem;margin-top:0.75rem;">
            <button type="submit" style="width:auto;margin:0;padding:0.5rem 1.25rem;">Save Changes</button>
            <button type="button" id="archive-btn" class="secondary" style="width:auto;margin:0;padding:0.5rem 1.25rem;">Archive</button>
            <button type="button" id="restore-btn" class="secondary" style="width:auto;margin:0;padding:0.5rem 1.25rem;display:none;">Restore</button>
            <button type="button" id="delete-btn" class="danger" style="width:auto;margin:0;padding:0.5rem 1.25rem;">Delete</button>
          </div>
          <p id="edit-error" class="error"></p>
          <p id="edit-success" class="success"></p>
        </form>

        <h2>Members</h2>
        <div id="members-table"></div>

        <h2>Add Member</h2>
        <form id="add-member-form" style="max-width:400px;">
          <label>User</label>
          <select name="userId" id="user-select">
            <option value="">Loading users…</option>
          </select>
          <label>Role in Team</label>
          <select name="teamRole">
            <option value="member">Member</option>
            <option value="lead">Lead</option>
          </select>
          <button type="submit" style="width:auto;margin-top:0.75rem;padding:0.5rem 1.25rem;">Add Member</button>
          <p id="member-error" class="error"></p>
          <p id="member-success" class="success"></p>
        </form>
      </div>

      <p id="error" class="error"></p>
    </div>

    <div class="container links">
      <a href="/teams">← Back to Teams</a>
      <a href="/users">Users</a>
    </div>

    <script type="module">
      import { request } from '/assets/js/auth-client.js';

      const params = new URLSearchParams(window.location.search);
      const teamId = params.get('id');
      if (!teamId) { window.location.href = '/teams'; }

      const headerEl = document.getElementById('team-header');
      const bodyEl = document.getElementById('team-body');
      const errorEl = document.getElementById('error');
      const membersEl = document.getElementById('members-table');
      let currentTeam = null;

      function initials(u) {
        return `${(u.firstName || '?')[0]}${(u.lastName || '?')[0]}`.toUpperCase();
      }

      async function loadUsers() {
        try {
          const data = await request('/api/users', 'GET');
          const select = document.getElementById('user-select');
          select.innerHTML = data.users.map((u) =>
            `<option value="${u.id}">${u.firstName} ${u.lastName} (${u.email})</option>`
          ).join('');
        } catch { /* non-fatal */ }
      }

      function renderMembers(members) {
        if (!members.length) {
          membersEl.innerHTML = '<p class="helper">No members yet.</p>';
          return;
        }
        membersEl.innerHTML = `
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>Member</th><th>Team Role</th><th>Joined</th><th>Actions</th></tr>
              </thead>
              <tbody>
                ${members.map((m) => `
                  <tr>
                    <td>
                      <div style="display:flex;align-items:center;gap:0.5rem;">
                        <div class="avatar sm">${m.user ? initials(m.user) : '?'}</div>
                        <div>
                          <div style="font-weight:600;">${m.user ? `${m.user.firstName} ${m.user.lastName}` : m.userId}</div>
                          <div style="font-size:0.8rem;color:var(--muted);">${m.user?.email || ''}</div>
                        </div>
                      </div>
                    </td>
                    <td><span class="badge ${m.role}">${m.role}</span></td>
                    <td style="color:var(--muted);font-size:0.85rem;">${m.joinedAt ? new Date(m.joinedAt).toLocaleDateString() : '—'}</td>
                    <td><button class="sm danger" style="margin:0;" onclick="removeMember('${m.userId}')">Remove</button></td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
        `;
      }

      async function loadTeam() {
        try {
          const data = await request(`/api/teams/${teamId}`, 'GET');
          currentTeam = data.team;
          document.title = `${currentTeam.name} - Sunave`;

          headerEl.innerHTML = `
            <div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:0.5rem;">
              <div class="tree-icon" style="width:40px;height:40px;${currentTeam.color ? `background:${currentTeam.color}` : ''}">${currentTeam.icon || currentTeam.name.charAt(0).toUpperCase()}</div>
              <div>
                <h1 style="margin:0;">${currentTeam.name}</h1>
                <p class="helper" style="margin:0;">${currentTeam.description || 'No description'} ${currentTeam.archived ? '<span class="badge archived">archived</span>' : ''}</p>
              </div>
            </div>
          `;

          const form = document.getElementById('edit-form');
          form.name.value = currentTeam.name;
          form.description.value = currentTeam.description;
          form.color.value = currentTeam.color;

          const archiveBtn = document.getElementById('archive-btn');
          const restoreBtn = document.getElementById('restore-btn');
          if (currentTeam.archived) {
            archiveBtn.style.display = 'none';
            restoreBtn.style.display = '';
          } else {
            archiveBtn.style.display = '';
            restoreBtn.style.display = 'none';
          }

          renderMembers(currentTeam.members || []);
          bodyEl.style.display = 'block';
          loadUsers();
        } catch (err) {
          if (err.message.includes('Authentication')) {
            window.location.href = '/auth/login';
          } else {
            errorEl.textContent = err.message;
          }
        }
      }

      document.getElementById('edit-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errEl = document.getElementById('edit-error');
        const sucEl = document.getElementById('edit-success');
        errEl.textContent = '';
        sucEl.textContent = '';
        try {
          await request(`/api/teams/${teamId}`, 'PUT', {
            name: e.target.name.value,
            description: e.target.description.value,
            color: e.target.color.value
          });
          sucEl.textContent = 'Team updated.';
          loadTeam();
        } catch (err) {
          errEl.textContent = err.message;
        }
      });

      document.getElementById('archive-btn').addEventListener('click', async () => {
        try {
          await request(`/api/teams/${teamId}/archive`, 'POST', {});
          loadTeam();
        } catch (err) {
          document.getElementById('edit-error').textContent = err.message;
        }
      });

      document.getElementById('restore-btn').addEventListener('click', async () => {
        try {
          await request(`/api/teams/${teamId}/restore`, 'POST', {});
          loadTeam();
        } catch (err) {
          document.getElementById('edit-error').textContent = err.message;
        }
      });

      document.getElementById('delete-btn').addEventListener('click', async () => {
        if (!confirm('Delete this team? This cannot be undone.')) return;
        try {
          await request(`/api/teams/${teamId}`, 'DELETE');
          window.location.href = '/teams';
        } catch (err) {
          document.getElementById('edit-error').textContent = err.message;
        }
      });

      document.getElementById('add-member-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const errEl = document.getElementById('member-error');
        const sucEl = document.getElementById('member-success');
        errEl.textContent = '';
        sucEl.textContent = '';
        const userId = e.target.userId.value;
        if (!userId) { errEl.textContent = 'Select a user.'; return; }
        try {
          await request(`/api/teams/${teamId}/members`, 'POST', { userId, role: e.target.teamRole.value });
          sucEl.textContent = 'Member added.';
          loadTeam();
        } catch (err) {
          errEl.textContent = err.message;
        }
      });

      window.removeMember = async (userId) => {
        try {
          await request(`/api/teams/${teamId}/members/${userId}`, 'DELETE');
          loadTeam();
        } catch (err) {
          errorEl.textContent = err.message;
        }
      };

      loadTeam();
    </script>
  </body>
</html>
