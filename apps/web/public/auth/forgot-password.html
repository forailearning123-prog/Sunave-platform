<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password - Sunave</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div class="container" id="root"></div>
    <script type="module">
      import { renderForm } from '/assets/js/form-component.js';
      import { request, valuesFromForm } from '/assets/js/auth-client.js';

      const ui = renderForm({
        rootId: 'root',
        title: 'Forgot Password',
        submitLabel: 'Send Reset Link',
        helper: 'A reset link will be generated if your account exists.',
        fields: [{ name: 'email', label: 'Email', type: 'email' }]
      });

      ui.form.addEventListener('submit', async (event) => {
        event.preventDefault();
        ui.error.textContent = '';
        ui.success.textContent = '';
        try {
          const data = await request('/api/auth/forgot-password', 'POST', valuesFromForm(ui.form));
          ui.success.textContent = data.resetToken
            ? `Development reset token: ${data.resetToken}`
            : 'Reset instructions have been sent.';
        } catch (error) {
          ui.error.textContent = error.message;
        }
      });
    </script>
    <div class="container links">
      <a href="/auth/login">Back to login</a>
      <a href="/auth/reset-password">Already have a token?</a>
    </div>
  <script type='module' src='/assets/js/ui-core.js'></script>
</body>
</html>
