<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Organization Setup - Sunave</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div class="container" id="root"></div>
    <script type="module">
      import { renderForm } from '/assets/js/form-component.js';
      import { request, valuesFromForm } from '/assets/js/auth-client.js';

      const ui = renderForm({
        rootId: 'root',
        title: 'Create Organization',
        submitLabel: 'Continue',
        helper: 'Required for first login.',
        fields: [
          { name: 'organizationName', label: 'Organization Name' },
          { name: 'industry', label: 'Industry' },
          { name: 'country', label: 'Country' }
        ]
      });

      ui.form.addEventListener('submit', async (event) => {
        event.preventDefault();
        ui.error.textContent = '';
        try {
          await request('/api/auth/complete-onboarding', 'POST', valuesFromForm(ui.form));
          window.location.href = '/dashboard';
        } catch (error) {
          ui.error.textContent = error.message;
        }
      });
    </script>
  <script type='module' src='/assets/js/ui-core.js'></script>
</body>
</html>
