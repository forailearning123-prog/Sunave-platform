<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Organization Setup - Sunave</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div class="container" id="root"></div>
    <script type="module">
      import { renderForm } from '/assets/js/form-component.js';
      import { request, valuesFromForm } from '/assets/js/auth-client.js';

      const ui = renderForm({
        rootId: 'root',
        title: 'Create Organization',
        submitLabel: 'Create Workspace',
        helper: 'Set up your workspace to get started.',
        fields: [
          { name: 'organizationName', label: 'Organization Name', type: 'text' },
          { name: 'slug', label: 'Workspace URL Slug', type: 'text' },
          { name: 'industry', label: 'Industry', type: 'text' },
          { name: 'companySize', label: 'Company Size', type: 'text' },
          { name: 'country', label: 'Country', type: 'text' },
          { name: 'timezone', label: 'Time Zone', type: 'text', value: 'UTC' }
        ]
      });

      ui.form.addEventListener('submit', async (event) => {
        event.preventDefault();
        ui.error.textContent = '';
        try {
          const values = valuesFromForm(ui.form);
          // Auto-fill fallback for legacy fields expected by API
          if (!values.industry) values.industry = 'Technology';
          if (!values.country) values.country = 'US';
          
          await request('/api/auth/complete-onboarding', 'POST', values);
          // Redirect to Welcome Wizard instead of directly to dashboard
          window.location.href = '/onboarding/wizard.html';
        } catch (error) {
          ui.error.textContent = error.message;
        }
      });
    </script>
    <script type='module' src='/assets/js/ui-core.js'></script>
  </body>
</html>
