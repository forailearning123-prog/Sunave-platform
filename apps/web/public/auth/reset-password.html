<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password - Sunave</title>
    <link rel="stylesheet" href="/assets/css/styles.css" />
  </head>
  <body>
    <div class="container" id="root"></div>
    <script type="module">
      import { renderForm } from '/assets/js/form-component.js';
      import { request, valuesFromForm } from '/assets/js/auth-client.js';

      const ui = renderForm({
        rootId: 'root',
        title: 'Reset Password',
        submitLabel: 'Reset Password',
        fields: [
          { name: 'token', label: 'Reset Token' },
          { name: 'newPassword', label: 'New Password', type: 'password' }
        ]
      });

      ui.form.addEventListener('submit', async (event) => {
        event.preventDefault();
        ui.error.textContent = '';
        ui.success.textContent = '';
        try {
          await request('/api/auth/reset-password', 'POST', valuesFromForm(ui.form));
          ui.success.textContent = 'Password has been reset. You can now login.';
        } catch (error) {
          ui.error.textContent = error.message;
        }
      });
    </script>
    <div class="container links"><a href="/auth/login">Back to login</a></div>
  </body>
</html>
