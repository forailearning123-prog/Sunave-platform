<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>AI Workspace</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
  <style>
    .workspace { max-width: 1200px; margin: 0 auto; padding: 2rem; }
    .hero-search { padding: 3rem; background: var(--bg-card); border-radius: 12px; text-align: center; border: 1px solid var(--border-color); margin-bottom: 2rem; }
    .hero-search input { width: 100%; max-width: 600px; padding: 1rem; font-size: 1.2rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--bg-body); color: var(--text-color); margin-top: 1rem; }
    .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 1.5rem; margin-bottom: 2rem; }
    .card { padding: 1.5rem; background: var(--bg-card); border: 1px solid var(--border-color); border-radius: 8px; cursor: pointer; transition: transform 0.2s; }
    .card:hover { transform: translateY(-2px); border-color: var(--primary); }
    .section-title { margin: 2rem 0 1rem 0; font-size: 1.2rem; color: var(--text-muted); }
  </style>
</head>
<body>
  <div class="workspace animate-in">
    <div class="hero-search">
      <h1 style="margin:0; font-size:2.5rem;">Good morning.</h1>
      <input type="text" placeholder="Ask AI, search files, or trigger workflows (Ctrl+K)" />
    </div>

    <h3 class="section-title">Pinned Agents</h3>
    <div class="grid-4">
      <div class="card" onclick="window.location.href='/conversations/chat.html'">
        <h3>?? Data Analyst</h3>
        <p style="color:var(--text-muted); font-size:0.9rem;">Query DBs, generate charts.</p>
      </div>
      <div class="card">
        <h3>?? Content Writer</h3>
      </div>
    </div>
  </div>
  <script type="module" src="/assets/js/ui-core.js"></script>
</body>
</html>
