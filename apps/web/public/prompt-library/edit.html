<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Edit Prompt - Sunave AI OS</title><script src="https://unpkg.com/lucide@latest"></script>
<style>
:root{--bg-primary:#0f1117;--bg-secondary:#181b24;--bg-card:#1e2130;--bg-hover:#262a3a;--border:#2a2e3e;--text-primary:#e8eaed;--text-secondary:#9ca3b0;--text-muted:#6b7280;--accent:#6366f1;--success:#22c55e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-primary);color:var(--text-primary);}
.layout{display:flex;}
.sidebar{width:260px;background:var(--bg-secondary);border-right:1px solid var(--border);padding:1.5rem;position:fixed;height:100vh;overflow-y:auto;}
.sidebar h2{font-size:1.2rem;font-weight:700;color:var(--accent);margin-bottom:1.5rem;}
.nav-item{display:flex;align-items:center;gap:0.75rem;padding:0.7rem 1rem;color:var(--text-secondary);text-decoration:none;border-radius:8px;font-size:0.9rem;}
.nav-item:hover{background:var(--bg-hover);color:var(--text-primary);}
.nav-item.active{background:var(--accent);color:white;}
.nav-label{font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;padding:0 1rem;margin-bottom:0.5rem;margin-top:1rem;}
.main{margin-left:260px;flex:1;padding:2rem;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;}
.header h1{font-size:1.5rem;font-weight:600;}
.action-btn{padding:0.5rem 1rem;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);cursor:pointer;font-size:0.85rem;}
.action-btn:hover{background:var(--bg-hover);border-color:var(--accent);}
.action-btn.primary{background:var(--accent);border-color:var(--accent);color:white;}
.form-group{margin-bottom:1rem;}
.form-group label{display:block;color:var(--text-secondary);font-size:0.85rem;margin-bottom:0.3rem;font-weight:500;}
.form-group input,.form-group select,.form-group textarea{width:100%;padding:0.6rem;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-size:0.9rem;font-family:inherit;}
.form-group textarea{min-height:100px;resize:vertical;}
.form-group textarea.template{min-height:250px;font-family:monospace;}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.variable-row{display:flex;gap:0.5rem;margin-bottom:0.5rem;align-items:center;}
.variable-row input{flex:1;padding:0.4rem;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-size:0.85rem;}
.variable-row select{padding:0.4rem;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-size:0.85rem;}
.btn-sm{padding:0.3rem 0.6rem;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);cursor:pointer;font-size:0.8rem;}
.btn-sm:hover{background:var(--bg-hover);}
.tab-bar{display:flex;gap:0;margin-bottom:1.5rem;border-bottom:1px solid var(--border);}
.tab{padding:0.6rem 1.2rem;cursor:pointer;color:var(--text-muted);border-bottom:2px solid transparent;font-size:0.9rem;}
.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-content{display:none;}
.tab-content.active{display:block;}
</style>
</head>
<body>
<div class="layout">
<nav class="sidebar">
<h2>🤖 AI OS</h2>
<div class="nav-label">AI Runtime</div>
<a href="/conversations/index.html" class="nav-item"><i data-lucide="message-circle"></i> Conversations</a>
<a href="/prompt-library/index.html" class="nav-item active"><i data-lucide="file-text"></i> Prompt Library</a>
<a href="/runtime/index.html" class="nav-item"><i data-lucide="zap"></i> AI Runtime</a>
</nav>
<div class="main">
<div class="header"><div><h1 id="pageTitle">New Prompt</h1></div>
<div style="display:flex;gap:0.5rem;">
<button class="action-btn" onclick="saveDraft()">Save Draft</button>
<button class="action-btn primary" onclick="publishPrompt()">Publish</button>
</div></div>

<div class="tab-bar">
<span class="tab active" data-tab="editor" onclick="switchTab('editor')">Editor</span>
<span class="tab" data-tab="variables" onclick="switchTab('variables')">Variables</span>
<span class="tab" data-tab="settings" onclick="switchTab('settings')">Settings</span>
<span class="tab" data-tab="versions" onclick="switchTab('versions')">Versions</span>
</div>

<div class="tab-content active" id="tab-editor">
<div class="form-group"><label>Prompt Name</label><input type="text" id="promptName" placeholder="e.g. Support Response Generator"></div>
<div class="form-row">
<div class="form-group"><label>Category</label><select id="categoryId"></select></div>
<div class="form-group"><label>Output Format</label><select id="outputFormat"><option value="text">Text</option><option value="json">JSON</option><option value="markdown">Markdown</option><option value="code">Code</option><option value="html">HTML</option><option value="yaml">YAML</option><option value="xml">XML</option></select></div>
</div>
<div class="form-group"><label>Description</label><input type="text" id="description" placeholder="Brief description of what this prompt does"></div>
<div class="form-group"><label>System Prompt</label><textarea id="systemPrompt" placeholder="Instructions for the AI's behavior..." rows="3"></textarea></div>
<div class="form-group"><label>Template</label><textarea class="template" id="template" placeholder="Enter your prompt template with {{variables}}..."></textarea></div>
</div>

<div class="tab-content" id="tab-variables">
<p style="color:var(--text-muted);margin-bottom:1rem;">Define variables that will be replaced when the prompt is used.</p>
<div id="variableList"></div>
<button class="btn-sm" onclick="addVariable()">+ Add Variable</button>
</div>

<div class="tab-content" id="tab-settings">
<div class="form-group"><label>Capabilities (comma-separated)</label><input type="text" id="capabilities" placeholder="e.g. chat, reasoning, coding"></div>
<div class="form-row">
<div class="form-group"><label>Max Tokens</label><input type="number" id="maxTokens" value="2048"></div>
<div class="form-group"><label>Temperature</label><input type="number" id="temperature" value="0.7" step="0.1" min="0" max="2"></div>
</div>
<div class="form-row">
<div class="form-group"><label>Top P</label><input type="number" id="topP" value="1" step="0.05" min="0" max="1"></div>
<div class="form-group"><label>Retry Count</label><input type="number" id="retryCount" value="0" min="0"></div>
</div>
<div class="form-group"><label>Tags (comma-separated)</label><input type="text" id="tags" placeholder="e.g. general, support, automation"></div>
</div>

<div class="tab-content" id="tab-versions">
<div id="versionList"><p style="color:var(--text-muted);">No version history yet.</p></div>
</div>

</div></div>
<script>
let promptId = new URLSearchParams(location.search).get('id');
let variables = [];

async function init() {
  const catRes = await (await fetch('/api/prompts/categories')).json();
  if (catRes.success) {
    const sel = document.getElementById('categoryId');
    (catRes.data.categories || []).forEach(c => {
      const opt = document.createElement('option'); opt.value = c.id; opt.textContent = c.display_name; sel.appendChild(opt);
    });
  }
  if (promptId) {
    document.getElementById('pageTitle').textContent = 'Edit Prompt';
    const res = await (await fetch(`/api/prompts/${promptId}`)).json();
    if (res.success) {
      const p = res.data.prompt;
      document.getElementById('promptName').value = p.name;
      document.getElementById('description').value = p.description || '';
      document.getElementById('template').value = p.template;
      document.getElementById('systemPrompt').value = p.systemPrompt || '';
      document.getElementById('categoryId').value = p.categoryId || '';
      document.getElementById('outputFormat').value = p.outputFormat || 'text';
      document.getElementById('capabilities').value = (p.capabilities || []).join(', ');
      document.getElementById('tags').value = (p.tags || []).join(', ');
      if (p.runtimePolicies) {
        document.getElementById('maxTokens').value = p.runtimePolicies.maxTokens || 2048;
        document.getElementById('temperature').value = p.runtimePolicies.temperature || 0.7;
        document.getElementById('topP').value = p.runtimePolicies.topP || 1;
        document.getElementById('retryCount').value = p.runtimePolicies.retryCount || 0;
      }
      variables = p.variables || [];
      renderVariables();
      renderVersions(res.data.versions);
    }
  } else { addVariable(); }
}

function addVariable() {
  variables.push({ name: '', type: 'text', label: '', required: true, description: '' });
  renderVariables();
}

function removeVariable(idx) {
  variables.splice(idx, 1);
  renderVariables();
}

function renderVariables() {
  document.getElementById('variableList').innerHTML = variables.map((v, i) => `
    <div class="variable-row">
      <input placeholder="Variable name" value="${v.name}" onchange="variables[${i}].name=this.value">
      <input placeholder="Label" value="${v.label}" onchange="variables[${i}].label=this.value" style="max-width:120px">
      <select onchange="variables[${i}].type=this.value">
        <option value="text" ${v.type==='text'?'selected':''}>Text</option>
        <option value="textarea" ${v.type==='textarea'?'selected':''}>Textarea</option>
        <option value="select" ${v.type==='select'?'selected':''}>Select</option>
      </select>
      <button class="btn-sm" onclick="removeVariable(${i})">✕</button>
    </div>
  `).join('');
}

function renderVersions(versions) {
  if (!versions || versions.length === 0) return;
  document.getElementById('versionList').innerHTML = versions.map(v => `
    <div style="padding:0.5rem 0;border-bottom:1px solid var(--border);font-size:0.85rem;">
      <strong>v${v.version}</strong> - ${v.changelog || 'No notes'} 
      <span style="color:var(--text-muted);font-size:0.75rem;">${new Date(v.createdAt).toLocaleString()}</span>
    </div>
  `).join('');
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  document.querySelector(`[data-tab="${name}"]`).classList.add('active');
  document.getElementById(`tab-${name}`).classList.add('active');
}

async function saveDraft() {
  await savePrompt('draft');
}

async function publishPrompt() {
  const id = await savePrompt('published');
  if (id) location.href = `/prompt-library/edit.html?id=${id}`;
}

async function savePrompt(status) {
  const body = {
    name: document.getElementById('promptName').value,
    description: document.getElementById('description').value,
    template: document.getElementById('template').value,
    systemPrompt: document.getElementById('systemPrompt').value,
    categoryId: document.getElementById('categoryId').value,
    outputFormat: document.getElementById('outputFormat').value,
    capabilities: document.getElementById('capabilities').value.split(',').map(s=>s.trim()).filter(Boolean),
    tags: document.getElementById('tags').value.split(',').map(s=>s.trim()).filter(Boolean),
    variables,
    runtimePolicies: {
      maxTokens: parseInt(document.getElementById('maxTokens').value) || 2048,
      temperature: parseFloat(document.getElementById('temperature').value) || 0.7,
      topP: parseFloat(document.getElementById('topP').value) || 1,
      retryCount: parseInt(document.getElementById('retryCount').value) || 0
    },
    status
  };
  if (!body.name || !body.template) { alert('Name and template are required.'); return; }

  const method = promptId ? 'PUT' : 'POST';
  const url = promptId ? `/api/prompts/${promptId}` : '/api/prompts';
  const res = await fetch(url, { method, headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
  const data = await res.json();
  if (data.success) {
    if (!promptId && status === 'published') {
      const pid = data.data.prompt.id;
      await fetch(`/api/prompts/${pid}/publish`, { method: 'POST' });
    }
    alert('Prompt saved!');
    if (!promptId) location.href = `/prompt-library/edit.html?id=${data.data.prompt.id}`;
    return data.data.prompt.id;
  } else {
    alert('Error: ' + (data.error?.message || 'Save failed'));
  }
}

init();
</script></body></html>
