<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Conversation - Sunave AI OS</title><script src="https://unpkg.com/lucide@latest"></script>
<style>
:root{--bg-primary:#0f1117;--bg-secondary:#181b24;--bg-card:#1e2130;--bg-hover:#262a3a;--border:#2a2e3e;--text-primary:#e8eaed;--text-secondary:#9ca3b0;--text-muted:#6b7280;--accent:#6366f1;--success:#22c55e;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-primary);color:var(--text-primary);height:100vh;display:flex;flex-direction:column;}
.header{display:flex;justify-content:space-between;align-items:center;padding:1rem 2rem;border-bottom:1px solid var(--border);background:var(--bg-secondary);}
.header h1{font-size:1.2rem;font-weight:600;}
.header .actions{display:flex;gap:0.5rem;}
.action-btn{padding:0.4rem 0.8rem;border-radius:6px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);cursor:pointer;font-size:0.8rem;}
.action-btn:hover{background:var(--bg-hover);border-color:var(--accent);}
.action-btn.primary{background:var(--accent);border-color:var(--accent);color:white;}
.chat-area{flex:1;overflow-y:auto;padding:2rem;display:flex;flex-direction:column;gap:1rem;}
.message{max-width:80%;padding:1rem;border-radius:12px;line-height:1.5;font-size:0.9rem;}
.message.user{background:var(--accent);color:white;align-self:flex-end;border-bottom-right-radius:4px;}
.message.assistant{background:var(--bg-card);border:1px solid var(--border);align-self:flex-start;border-bottom-left-radius:4px;}
.message.system{background:var(--bg-hover);align-self:center;font-size:0.8rem;color:var(--text-muted);max-width:60%;text-align:center;}
.message .meta{font-size:0.7rem;color:var(--text-muted);margin-top:0.5rem;}
.input-area{display:flex;gap:0.75rem;padding:1rem 2rem;border-top:1px solid var(--border);background:var(--bg-secondary);}
.input-area textarea{flex:1;padding:0.75rem;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-size:0.9rem;resize:none;min-height:48px;font-family:inherit;}
.input-area textarea:focus{outline:none;border-color:var(--accent);}
.send-btn{padding:0.75rem 1.5rem;border-radius:8px;border:none;background:var(--accent);color:white;cursor:pointer;font-size:0.9rem;}
.send-btn:hover{background:var(--accent-hover);}
.send-btn:disabled{opacity:0.5;cursor:not-allowed;}
.loading-dots{display:flex;gap:4px;padding:0.5rem;}
.loading-dots span{width:8px;height:8px;border-radius:50%;background:var(--text-muted);animation:bounce 1.4s infinite ease-in-out both;}
.loading-dots span:nth-child(1){animation-delay:-0.32s;}
.loading-dots span:nth-child(2){animation-delay:-0.16s;}
@keyframes bounce{0%,80%,100%{transform:scale(0)}40%{transform:scale(1)}}
</style>
</head>
<body>
<div class="header">
<div><h1 id="convTitle">Loading...</h1></div>
<div class="actions">
<button class="action-btn" onclick="togglePin()">📌 Pin</button>
<button class="action-btn" onclick="toggleFav()">⭐ Favorite</button>
<button class="action-btn" onclick="duplicate()">📋 Duplicate</button>
<button class="action-btn" onclick="location.href='/conversations/index.html'">← Back</button>
</div></div>
<div class="chat-area" id="chatArea"></div>
<div class="input-area">
<textarea id="messageInput" placeholder="Type your message..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMessage()}"></textarea>
<button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
</div>
<script>
let convId = new URLSearchParams(location.search).get('id');
let messages = [];

async function load() {
  const res = await (await fetch(`/api/conversations/${convId}`)).json();
  if (!res.success) return;
  const conv = res.data.conversation;
  document.getElementById('convTitle').textContent = conv.title;
  const msgRes = await (await fetch(`/api/conversations/${convId}/messages`)).json();
  if (msgRes.success) { messages = msgRes.data.messages || []; renderMessages(); }
}

function renderMessages() {
  const el = document.getElementById('chatArea');
  el.innerHTML = messages.map(m => `
    <div class="message ${m.role}">
      ${m.content}
      ${m.provider ? `<div class="meta">via ${m.provider}${m.model ? ' · ' + m.model : ''}${m.totalCostUsd ? ' · $' + Number(m.totalCostUsd).toFixed(6) : ''}</div>` : ''}
    </div>
  `).join('');
  el.scrollTop = el.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById('messageInput');
  const btn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text) return;

  input.value = ''; btn.disabled = true;
  messages.push({ role: 'user', content: text });
  renderMessages();

  const el = document.getElementById('chatArea');
  el.innerHTML += `<div class="message assistant"><div class="loading-dots"><span></span><span></span><span></span></div></div>`;
  el.scrollTop = el.scrollHeight;

  try {
    const res = await fetch('/api/runtime/chat', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ conversationId: convId, prompt: text, capability: 'chat' })
    });
    const data = await res.json();
    if (data.success) {
      const result = data.data;
      messages.push({
        role: 'assistant',
        content: result.response?.content || JSON.stringify(result.response),
        provider: result.provider,
        model: result.model,
        totalCostUsd: result.usage?.totalTokens ? result.usage.totalTokens * 0.000002 : 0
      });
    } else {
      messages.push({ role: 'assistant', content: 'Error: ' + (data.error?.message || 'Request failed') });
    }
  } catch (err) {
    messages.push({ role: 'assistant', content: 'Error: ' + err.message });
  }
  renderMessages();
  btn.disabled = false;
}

async function togglePin() {
  await fetch(`/api/conversations/${convId}/pin`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{"pinned":true}' });
}
async function toggleFav() {
  await fetch(`/api/conversations/${convId}/favorite`, { method: 'POST', headers: {'Content-Type':'application/json'}, body: '{"favorite":true}' });
}
async function duplicate() {
  const res = await (await fetch(`/api/conversations/${convId}/duplicate`, { method: 'POST' })).json();
  if (res.success) location.href = `/conversations/detail.html?id=${res.data.conversation.id}`;
}

load();
</script><script type='module' src='/assets/js/ui-core.js'></script>
</body></html>
