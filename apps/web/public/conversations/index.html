<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Conversations - Sunave AI OS</title><script src="https://unpkg.com/lucide@latest"></script>
<style>
:root{--bg-primary:#0f1117;--bg-secondary:#181b24;--bg-card:#1e2130;--bg-hover:#262a3a;--border:#2a2e3e;--text-primary:#e8eaed;--text-secondary:#9ca3b0;--text-muted:#6b7280;--accent:#6366f1;--success:#22c55e;--warning:#f59e0b;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg-primary);color:var(--text-primary);}
.layout{display:flex;}
.sidebar{width:260px;background:var(--bg-secondary);border-right:1px solid var(--border);padding:1.5rem;position:fixed;height:100vh;overflow-y:auto;}
.sidebar h2{font-size:1.2rem;font-weight:700;color:var(--accent);margin-bottom:1.5rem;}
.nav-item{display:flex;align-items:center;gap:0.75rem;padding:0.7rem 1rem;color:var(--text-secondary);text-decoration:none;border-radius:8px;font-size:0.9rem;}
.nav-item:hover{background:var(--bg-hover);color:var(--text-primary);}
.nav-item.active{background:var(--accent);color:white;}
.nav-label{font-size:0.7rem;color:var(--text-muted);text-transform:uppercase;letter-spacing:0.05em;padding:0 1rem;margin-bottom:0.5rem;margin-top:1rem;}
.main{margin-left:260px;flex:1;padding:2rem;}
.header{display:flex;justify-content:space-between;align-items:center;margin-bottom:2rem;}
.header h1{font-size:1.5rem;font-weight:600;}
.header p{color:var(--text-secondary);font-size:0.9rem;}
.action-btn{padding:0.5rem 1rem;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);cursor:pointer;font-size:0.85rem;}
.action-btn:hover{background:var(--bg-hover);border-color:var(--accent);}
.action-btn.primary{background:var(--accent);border-color:var(--accent);color:white;}
.filters{display:flex;gap:0.75rem;margin-bottom:1.5rem;flex-wrap:wrap;}
.filter-select{padding:0.5rem;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-size:0.85rem;}
.search-input{padding:0.5rem;border-radius:8px;border:1px solid var(--border);background:var(--bg-card);color:var(--text-primary);font-size:0.85rem;flex:1;}
.conv-list{display:flex;flex-direction:column;gap:0.5rem;}
.conv-card{background:var(--bg-card);border:1px solid var(--border);border-radius:8px;padding:1rem;display:flex;justify-content:space-between;align-items:center;cursor:pointer;transition:all 0.15s;}
.conv-card:hover{border-color:var(--accent);}
.conv-card .title{font-weight:600;font-size:0.95rem;}
.conv-card .meta{color:var(--text-muted);font-size:0.8rem;margin-top:0.25rem;}
.conv-card .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:10px;font-size:0.7rem;font-weight:600;}
.badge.active{background:rgba(34,197,94,0.15);color:var(--success);}
.badge.paused{background:rgba(245,158,11,0.15);color:var(--warning);}
.badge.archived{background:rgba(107,114,128,0.15);color:var(--text-muted);}
.stats{display:flex;gap:0.5rem;}
.stats span{color:var(--text-muted);font-size:0.8rem;}
</style>
</head>
<body>
<div class="layout">
<nav class="sidebar">
<h2>🤖 AI OS</h2>
<div class="nav-label">AI Runtime</div>
<a href="/conversations/index.html" class="nav-item active"><i data-lucide="message-circle"></i> Conversations</a>
<a href="/prompt-library/index.html" class="nav-item"><i data-lucide="file-text"></i> Prompt Library</a>
<a href="/runtime/index.html" class="nav-item"><i data-lucide="zap"></i> AI Runtime</a>
<div class="nav-label">Management</div>
<a href="/admin/ai/index.html" class="nav-item"><i data-lucide="cpu"></i> AI Admin</a>
</nav>
<div class="main">
<div class="header">
<div><h1>Conversations</h1><p>Chat sessions and AI interactions</p></div>
<button class="action-btn primary" onclick="newConversation()">+ New Conversation</button>
</div>
<div class="filters">
<input type="text" class="search-input" id="searchInput" placeholder="Search conversations..." oninput="loadConversations()">
<select class="filter-select" id="typeFilter" onchange="loadConversations()">
<option value="">All Types</option><option value="chat">Chat</option><option value="assistant">Assistant</option><option value="research">Research</option><option value="support">Support</option>
</select>
<select class="filter-select" id="statusFilter" onchange="loadConversations()">
<option value="">All Status</option><option value="active">Active</option><option value="paused">Paused</option><option value="archived">Archived</option>
</select>
</div>
<div class="conv-list" id="convList"><p style="color:var(--text-muted);text-align:center;padding:2rem;">Loading conversations...</p></div>
</div></div>
<script>
lucide.createIcons();
let convs = [];

async function loadConversations() {
  const search = document.getElementById('searchInput').value;
  const type = document.getElementById('typeFilter').value;
  const status = document.getElementById('statusFilter').value;
  const params = new URLSearchParams({ limit: 100 });
  if (search) params.set('search', search);
  if (type) params.set('type', type);
  if (status) params.set('status', status);
  const res = await (await fetch(`/api/conversations?${params}`)).json();
  if (!res.success) return;
  convs = res.data.conversations || [];
  renderList();
}

function renderList() {
  const el = document.getElementById('convList');
  if (convs.length === 0) { el.innerHTML = '<p style="color:var(--text-muted);text-align:center;padding:2rem;">No conversations found.</p>'; return; }
  el.innerHTML = convs.map(c => `
    <div class="conv-card" onclick="location.href='/conversations/detail.html?id=${c.id}'">
      <div>
        <div class="title">${c.title} ${c.pinned ? '📌' : ''} ${c.favorite ? '⭐' : ''}</div>
        <div class="meta">${c.type} · ${c.messageCount || 0} messages · ${new Date(c.updatedAt).toLocaleDateString()}</div>
      </div>
      <div class="stats">
        <span class="badge ${c.status}">${c.status}</span>
        <span style="color:var(--text-muted);font-size:0.8rem;">${c.userName||'You'}</span>
      </div>
    </div>
  `).join('');
}

async function newConversation() {
  const res = await fetch('/api/conversations', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify({title: 'New Conversation', type:'chat'}) });
  const data = await res.json();
  if (data.success) location.href = `/conversations/detail.html?id=${data.data.conversation.id}`;
}

loadConversations();
</script></body></html>
