<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search - AI Intelligence Platform</title>
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="stylesheet" href="/styles/intelligence.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Intelligence</h2>
      </div>
      <nav class="sidebar-nav">
        <a href="/intelligence" class="nav-item" data-page="overview">
          <span class="icon">📊</span>
          <span>Overview</span>
        </a>
        <a href="/intelligence/memory" class="nav-item" data-page="memory">
          <span class="icon">🧠</span>
          <span>Memory</span>
        </a>
        <a href="/intelligence/search" class="nav-item active" data-page="search">
          <span class="icon">🔍</span>
          <span>Search</span>
        </a>
        <a href="/intelligence/context" class="nav-item" data-page="context">
          <span class="icon">📝</span>
          <span>Context</span>
        </a>
        <a href="/intelligence/knowledge" class="nav-item" data-page="knowledge">
          <span class="icon">📚</span>
          <span>Knowledge</span>
        </a>
        <a href="/intelligence/vector" class="nav-item" data-page="vector">
          <span class="icon">🔮</span>
          <span>Vector Store</span>
        </a>
        <a href="/intelligence/admin" class="nav-item" data-page="admin">
          <span class="icon">⚙️</span>
          <span>Admin</span>
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="page-header">
        <h1>Semantic Search</h1>
      </header>

      <div class="page-content">
        <div class="search-box">
          <input type="text" id="searchInput" class="search-input" placeholder="Search memories and knowledge...">
          <select id="searchType" class="form-select">
            <option value="semantic">Semantic Search</option>
            <option value="keyword">Keyword Search</option>
          </select>
          <button class="btn btn-primary" id="searchBtn">Search</button>
        </div>

        <div class="search-results" id="searchResults">
          <p class="text-muted">Enter a query to search across memories and knowledge base.</p>
        </div>
      </div>
    </main>
  </div>

  <script type="module" src="/app/intelligence.js"></script>
<script type='module' src='/assets/js/ui-core.js'></script>
</body>
</html>
