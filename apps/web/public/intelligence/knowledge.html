<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Knowledge Base - AI Intelligence Platform</title>
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="stylesheet" href="/styles/intelligence.css">
</head>
<body>
  <div class="app-container">
    <aside class="sidebar">
      <div class="sidebar-header">
        <h2>Intelligence</h2>
      </div>
      <nav class="sidebar-nav">
        <a href="/intelligence" class="nav-item" data-page="overview">
          <span class="icon">📊</span>
          <span>Overview</span>
        </a>
        <a href="/intelligence/memory" class="nav-item" data-page="memory">
          <span class="icon">🧠</span>
          <span>Memory</span>
        </a>
        <a href="/intelligence/search" class="nav-item" data-page="search">
          <span class="icon">🔍</span>
          <span>Search</span>
        </a>
        <a href="/intelligence/context" class="nav-item" data-page="context">
          <span class="icon">📝</span>
          <span>Context</span>
        </a>
        <a href="/intelligence/knowledge" class="nav-item active" data-page="knowledge">
          <span class="icon">📚</span>
          <span>Knowledge</span>
        </a>
        <a href="/intelligence/vector" class="nav-item" data-page="vector">
          <span class="icon">🔮</span>
          <span>Vector Store</span>
        </a>
        <a href="/intelligence/admin" class="nav-item" data-page="admin">
          <span class="icon">⚙️</span>
          <span>Admin</span>
        </a>
      </nav>
    </aside>

    <main class="main-content">
      <header class="page-header">
        <h1>Knowledge Base</h1>
        <div class="header-actions">
          <button class="btn btn-primary" id="addSourceBtn">
            + Add Source
          </button>
        </div>
      </header>

      <div class="page-content">
        <div class="filters-bar">
          <select id="sourceTypeFilter" class="form-select">
            <option value="">All Types</option>
            <option value="knowledge_base">Knowledge Base</option>
            <option value="document">Document</option>
            <option value="project">Project</option>
            <option value="goal">Goal</option>
            <option value="task">Task</option>
            <option value="conversation">Conversation</option>
            <option value="uploaded_file">Uploaded File</option>
          </select>

          <select id="statusFilter" class="form-select">
            <option value="">All Status</option>
            <option value="pending">Pending</option>
            <option value="indexing">Indexing</option>
            <option value="indexed">Indexed</option>
            <option value="failed">Failed</option>
          </select>
        </div>

        <div class="knowledge-grid" id="knowledgeGrid">
          <p class="text-muted">Loading knowledge sources...</p>
        </div>
      </div>
    </main>
  </div>

  <div class="modal" id="sourceModal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Add Knowledge Source</h2>
        <button class="modal-close" id="closeSourceModal">&times;</button>
      </div>
      <form id="sourceForm">
        <div class="form-group">
          <label for="sourceName">Name</label>
          <input type="text" id="sourceName" class="form-input" required>
        </div>

        <div class="form-group">
          <label for="sourceType">Type</label>
          <select id="sourceType" class="form-select" required>
            <option value="knowledge_base">Knowledge Base</option>
            <option value="document">Document</option>
            <option value="project">Project</option>
            <option value="goal">Goal</option>
            <option value="task">Task</option>
            <option value="conversation">Conversation</option>
            <option value="uploaded_file">Uploaded File</option>
          </select>
        </div>

        <div class="form-group">
          <label for="sourceIdentifier">Source Identifier</label>
          <input type="text" id="sourceIdentifier" class="form-input" placeholder="e.g., doc-id, project-id" required>
        </div>

        <div class="form-group">
          <label for="sourceDescription">Description</label>
          <textarea id="sourceDescription" class="form-textarea" rows="3"></textarea>
        </div>

        <div class="form-actions">
          <button type="button" class="btn btn-secondary" id="cancelSourceBtn">Cancel</button>
          <button type="submit" class="btn btn-primary">Add Source</button>
        </div>
      </form>
    </div>
  </div>

  <script type="module" src="/app/intelligence.js"></script>
</body>
</html>
