<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Agent Marketplace</title>
  <link rel="stylesheet" href="/assets/css/styles.css">
  <style>
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem; padding: 2rem; }
    .card { background: var(--bg-card); padding: 1.5rem; border-radius: 8px; border: 1px solid var(--border-color); }
    .card h3 { margin-top: 0; }
    .header { padding: 2rem; border-bottom: 1px solid var(--border-color); display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>
  <div class="header">
    <h2>Agent Marketplace</h2>
    <input type="text" class="form-control" placeholder="Search templates..." style="width: 300px;" />
  </div>
  <div class="grid animate-in" id="marketplace-grid">
  </div>
  <script type="module">
    import { showSkeleton } from '/assets/js/ui-core.js';
    const grid = document.getElementById('marketplace-grid');
    showSkeleton('marketplace-grid', 'card');
    
    // Simulate API fetch to /api/agents/marketplace
    setTimeout(() => {
      grid.innerHTML = 
        <div class="card">
          <h3>Customer Support Bot</h3>
          <p style="color:var(--text-muted); font-size:0.9rem;">Resolves tier 1 tickets using company knowledge base.</p>
          <div style="margin-top:1rem; display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:0.8rem;">4.8 (120)</span>
            <button class="btn btn-primary" onclick="alert('Cloning template...')">Install</button>
          </div>
        </div>
        <div class="card">
          <h3>Code Reviewer</h3>
          <p style="color:var(--text-muted); font-size:0.9rem;">Reviews PRs against organization style guides.</p>
          <div style="margin-top:1rem; display:flex; justify-content:space-between; align-items:center;">
            <span style="font-size:0.8rem;">4.9 (85)</span>
            <button class="btn btn-primary" onclick="alert('Cloning template...')">Install</button>
          </div>
        </div>
      ;
    }, 800);
  </script>
  <script type="module" src="/assets/js/ui-core.js"></script>
</body>
</html>
