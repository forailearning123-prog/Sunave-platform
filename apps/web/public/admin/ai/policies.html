<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Policies - Sunave</title><script src="https://unpkg.com/lucide@latest"></script>
  <style>
    :root { --bg-primary: #0f1117; --bg-secondary: #181b24; --bg-card: #1e2130; --bg-hover: #262a3a; --border: #2a2e3e; --text-primary: #e8eaed; --text-secondary: #9ca3b0; --text-muted: #6b7280; --accent: #6366f1; --success: #22c55e; --warning: #f59e0b; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg-primary); color:var(--text-primary); }
    .layout { display:flex; }
    .sidebar { width:260px; background:var(--bg-secondary); border-right:1px solid var(--border); padding:1.5rem; position:fixed; height:100vh; overflow-y:auto; }
    .sidebar h2 { font-size:1.2rem; font-weight:700; color:var(--accent); margin-bottom:1.5rem; }
    .nav-item { display:flex; align-items:center; gap:0.75rem; padding:0.7rem 1rem; color:var(--text-secondary); text-decoration:none; border-radius:8px; font-size:0.9rem; }
    .nav-item:hover { background:var(--bg-hover); color:var(--text-primary); }
    .nav-item.active { background:var(--accent); color:white; }
    .nav-label { font-size:0.7rem; color:var(--text-muted); text-transform:uppercase; letter-spacing:0.05em; padding:0 1rem; margin-bottom:0.5rem; margin-top:1rem; }
    .main { margin-left:260px; flex:1; padding:2rem; }
    .header { display:flex; justify-content:space-between; align-items:center; margin-bottom:2rem; }
    .header h1 { font-size:1.5rem; font-weight:600; }
    .header p { color:var(--text-secondary); font-size:0.9rem; }
    .policy-card { background:var(--bg-card); border:1px solid var(--border); border-radius:12px; padding:1.25rem; margin-bottom:0.75rem; display:flex; justify-content:space-between; align-items:center; }
    .policy-card .name { font-weight:600; }
    .policy-card .desc { color:var(--text-secondary); font-size:0.85rem; margin-top:0.25rem; }
    .badge { display:inline-flex; align-items:center; padding:2px 8px; border-radius:10px; font-size:0.7rem; font-weight:600; }
    .badge.success { background:rgba(34,197,94,0.15); color:var(--success); }
    .badge.info { background:rgba(59,130,246,0.15); color:#3b82f6; }
  </style>
</head>
<body>
  <div class="layout">
    <nav class="sidebar">
      <h2>🤖 AI OS</h2>
      <div class="nav-label">Management</div>
      <a href="/admin/ai/index.html" class="nav-item"><i data-lucide="cpu"></i> Overview</a>
      <a href="/admin/ai/providers.html" class="nav-item"><i data-lucide="server"></i> Providers</a>
      <a href="/admin/ai/models.html" class="nav-item"><i data-lucide="layers"></i> Models</a>
      <a href="/admin/ai/capabilities.html" class="nav-item"><i data-lucide="zap"></i> Capabilities</a>
      <a href="/admin/ai/policies.html" class="nav-item active"><i data-lucide="route"></i> Policies</a>
      <div class="nav-label">Monitoring</div>
      <a href="/admin/ai/health.html" class="nav-item"><i data-lucide="heart-pulse"></i> Health</a>
      <a href="/admin/ai/usage.html" class="nav-item"><i data-lucide="activity"></i> Usage</a>
      <a href="/admin/ai/costs.html" class="nav-item"><i data-lucide="dollar-sign"></i> Costs</a>
      <a href="/admin/ai/settings.html" class="nav-item"><i data-lucide="settings"></i> Settings</a>
    </nav>
    <div class="main">
      <div class="header"><div><h1>Routing Policies</h1><p>Configure how AI requests are routed across providers</p></div></div>
      <div id="policyList"><p style="color:var(--text-muted);">Loading policies...</p></div>
    </div>
  </div>
  <script>
    lucide.createIcons();
    async function load() {
      const res = await (await fetch('/api/ai/policies')).json();
      if (!res.success) return;
      const { policies, availablePolicies } = res.data || {};
      const all = [
        ...(availablePolicies || []).map(name => {
          const existing = (policies || []).find(p => p.policy_type === name);
          return { name, description: existing?.settings?.description || name.replace(/_/g,' '), enabled: existing ? existing.enabled : false, scope: existing?.scope || 'available' };
        })
      ];
      document.getElementById('policyList').innerHTML = all.map(p => `
        <div class="policy-card">
          <div>
            <div class="name">${p.name.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase())}</div>
            <div class="desc">${p.description}</div>
          </div>
          <span class="badge ${p.enabled ? 'success' : 'info'}">${p.enabled ? 'Active' : p.scope === 'available' ? 'Available' : 'Disabled'}</span>
        </div>
      `).join('');
    }
    load();
  </script>
<script type='module' src='/assets/js/ui-core.js'></script>
</body>
</html>
