<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plugins - Sunave AI OS</title>
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="stylesheet" href="/styles/plugins.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Sunave</h1>
        <span class="version">Plugin Platform</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/dashboard" class="nav-item">Dashboard</a>
        <a href="/plugins" class="nav-item active">Plugins</a>
        <a href="/plugins/marketplace" class="nav-item">Marketplace</a>
        <a href="/integrations" class="nav-item">Integrations</a>
        <a href="/workers" class="nav-item">Workers</a>
        <a href="/agents" class="nav-item">Agents</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="page-header">
        <h1>Plugin Manager</h1>
        <div class="header-actions">
          <button class="btn btn-primary" onclick="openCreatePluginModal()">+ New Plugin</button>
        </div>
      </header>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" data-tab="installed">Installed</button>
        <button class="tab" data-tab="my-plugins">My Plugins</button>
        <button class="tab" data-tab="marketplace">Marketplace</button>
      </div>

      <!-- Installed Plugins Tab -->
      <div id="installed-tab" class="tab-content active">
        <div class="filters">
          <input type="text" id="installed-search" placeholder="Search installed plugins..." class="search-input">
          <select id="installed-status-filter" class="filter-select">
            <option value="">All Status</option>
            <option value="enabled">Enabled</option>
            <option value="disabled">Disabled</option>
            <option value="error">Error</option>
          </select>
        </div>

        <div id="installed-plugins-grid" class="plugins-grid">
          <!-- Plugins will be loaded here -->
        </div>
      </div>

      <!-- My Plugins Tab -->
      <div id="my-plugins-tab" class="tab-content">
        <div class="filters">
          <input type="text" id="my-plugins-search" placeholder="Search my plugins..." class="search-input">
          <select id="my-plugins-category-filter" class="filter-select">
            <option value="">All Categories</option>
            <option value="business">Business</option>
            <option value="ai">AI</option>
            <option value="worker">Worker</option>
            <option value="agent">Agent</option>
            <option value="dashboard">Dashboard</option>
            <option value="integration">Integration</option>
            <option value="automation">Automation</option>
            <option value="knowledge">Knowledge</option>
          </select>
        </div>

        <div id="my-plugins-grid" class="plugins-grid">
          <!-- Plugins will be loaded here -->
        </div>
      </div>

      <!-- Marketplace Tab -->
      <div id="marketplace-tab" class="tab-content">
        <div class="filters">
          <input type="text" id="marketplace-search" placeholder="Search marketplace..." class="search-input">
          <select id="marketplace-category-filter" class="filter-select">
            <option value="">All Categories</option>
            <option value="business">Business</option>
            <option value="ai">AI</option>
            <option value="worker">Worker</option>
            <option value="agent">Agent</option>
            <option value="dashboard">Dashboard</option>
            <option value="integration">Integration</option>
            <option value="automation">Automation</option>
            <option value="knowledge">Knowledge</option>
          </select>
          <select id="marketplace-sort" class="filter-select">
            <option value="featured">Featured</option>
            <option value="rating">Highest Rated</option>
            <option value="installs">Most Installed</option>
            <option value="newest">Newest</option>
          </select>
        </div>

        <div id="marketplace-grid" class="plugins-grid">
          <!-- Marketplace items will be loaded here -->
        </div>
      </div>
    </main>
  </div>

  <!-- Create Plugin Modal -->
  <div id="create-plugin-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Create New Plugin</h2>
        <button class="modal-close" onclick="closeModal('create-plugin-modal')">&times;</button>
      </div>
      <form id="create-plugin-form" class="modal-body">
        <div class="form-group">
          <label for="plugin-name">Plugin Name *</label>
          <input type="text" id="plugin-name" name="name" required>
        </div>
        <div class="form-group">
          <label for="plugin-display-name">Display Name *</label>
          <input type="text" id="plugin-display-name" name="displayName" required>
        </div>
        <div class="form-group">
          <label for="plugin-description">Description</label>
          <textarea id="plugin-description" name="description" rows="3"></textarea>
        </div>
        <div class="form-group">
          <label for="plugin-category">Category *</label>
          <select id="plugin-category" name="category" required>
            <option value="business">Business</option>
            <option value="ai">AI</option>
            <option value="worker">Worker</option>
            <option value="agent">Agent</option>
            <option value="dashboard">Dashboard</option>
            <option value="integration">Integration</option>
            <option value="automation">Automation</option>
            <option value="knowledge">Knowledge</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div class="form-group">
          <label for="plugin-version">Version</label>
          <input type="text" id="plugin-version" name="version" value="1.0.0">
        </div>
        <div class="form-group">
          <label for="plugin-entry-point">Entry Point *</label>
          <input type="text" id="plugin-entry-point" name="entryPoint" placeholder="index.js" required>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('create-plugin-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Plugin</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Plugin Details Modal -->
  <div id="plugin-details-modal" class="modal">
    <div class="modal-content modal-large">
      <div class="modal-header">
        <h2 id="plugin-details-title">Plugin Details</h2>
        <button class="modal-close" onclick="closeModal('plugin-details-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <div id="plugin-details-content">
          <!-- Plugin details will be loaded here -->
        </div>
      </div>
    </div>
  </div>

  <script src="/app/plugins.js"></script>
</body>
</html>
