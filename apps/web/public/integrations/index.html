<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Integrations - Sunave AI OS</title>
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="stylesheet" href="/styles/plugins.css">
</head>
<body>
  <div class="app-container">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <h1>Sunave</h1>
        <span class="version">Integrations</span>
      </div>
      <nav class="sidebar-nav">
        <a href="/dashboard" class="nav-item">Dashboard</a>
        <a href="/plugins" class="nav-item">Plugins</a>
        <a href="/plugins/marketplace" class="nav-item">Marketplace</a>
        <a href="/integrations" class="nav-item active">Integrations</a>
        <a href="/workers" class="nav-item">Workers</a>
        <a href="/agents" class="nav-item">Agents</a>
      </nav>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
      <header class="page-header">
        <h1>Integration Manager</h1>
        <div class="header-actions">
          <button class="btn btn-primary" onclick="openCreateIntegrationModal()">+ New Integration</button>
        </div>
      </header>

      <!-- Filters -->
      <div class="filters">
        <input type="text" id="integrations-search" placeholder="Search integrations..." class="search-input">
        <select id="integrations-provider-filter" class="filter-select">
          <option value="">All Providers</option>
          <option value="github">GitHub</option>
          <option value="gitlab">GitLab</option>
          <option value="jira">Jira</option>
          <option value="confluence">Confluence</option>
          <option value="slack">Slack</option>
          <option value="microsoft_teams">Microsoft Teams</option>
          <option value="salesforce">Salesforce</option>
          <option value="hubspot">HubSpot</option>
          <option value="twilio">Twilio</option>
        </select>
        <select id="integrations-status-filter" class="filter-select">
          <option value="">All Status</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
          <option value="error">Error</option>
        </select>
      </div>

      <!-- Integrations Grid -->
      <div id="integrations-grid" class="plugins-grid">
        <!-- Integrations will be loaded here -->
      </div>
    </main>
  </div>

  <!-- Create Integration Modal -->
  <div id="create-integration-modal" class="modal">
    <div class="modal-content">
      <div class="modal-header">
        <h2>Create New Integration</h2>
        <button class="modal-close" onclick="closeModal('create-integration-modal')">&times;</button>
      </div>
      <form id="create-integration-form" class="modal-body">
        <div class="form-group">
          <label for="integration-name">Integration Name *</label>
          <input type="text" id="integration-name" name="name" required>
        </div>
        <div class="form-group">
          <label for="integration-provider">Provider *</label>
          <select id="integration-provider" name="provider" required>
            <option value="github">GitHub</option>
            <option value="gitlab">GitLab</option>
            <option value="jira">Jira</option>
            <option value="confluence">Confluence</option>
            <option value="slack">Slack</option>
            <option value="microsoft_teams">Microsoft Teams</option>
            <option value="salesforce">Salesforce</option>
            <option value="hubspot">HubSpot</option>
            <option value="twilio">Twilio</option>
            <option value="custom">Custom</option>
          </select>
        </div>
        <div class="form-group">
          <label for="integration-type">Integration Type *</label>
          <select id="integration-type" name="integrationType" required>
            <option value="rest">REST API</option>
            <option value="graphql">GraphQL</option>
            <option value="webhook">Webhook</option>
            <option value="grpc">gRPC</option>
            <option value="soap">SOAP</option>
          </select>
        </div>
        <div class="form-group">
          <label for="integration-auth-type">Authentication Type *</label>
          <select id="integration-auth-type" name="authType" required>
            <option value="api_key">API Key</option>
            <option value="oauth2">OAuth 2.0</option>
            <option value="jwt">JWT</option>
            <option value="basic">Basic Auth</option>
            <option value="none">None</option>
          </select>
        </div>
        <div class="form-group">
          <label for="integration-description">Description</label>
          <textarea id="integration-description" name="description" rows="3"></textarea>
        </div>
        <div class="form-actions">
          <button type="button" class="btn btn-secondary" onclick="closeModal('create-integration-modal')">Cancel</button>
          <button type="submit" class="btn btn-primary">Create Integration</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Integration Details Modal -->
  <div id="integration-details-modal" class="modal">
    <div class="modal-content modal-large">
      <div class="modal-header">
        <h2 id="integration-details-title">Integration Details</h2>
        <button class="modal-close" onclick="closeModal('integration-details-modal')">&times;</button>
      </div>
      <div class="modal-body">
        <div id="integration-details-content">
          <!-- Integration details will be loaded here -->
        </div>
      </div>
    </div>
  </div>

  <script src="/app/integrations.js"></script>
</body>
</html>
