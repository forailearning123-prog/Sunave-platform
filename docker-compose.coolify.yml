services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    env_file:
      - .env
    labels:
      - traefik.enable=true
      - traefik.http.routers.sunave-api.rule=Host(`${SUNAVE_API_HOST}`)
      - traefik.http.routers.sunave-api.entrypoints=websecure
      - traefik.http.routers.sunave-api.tls=true
      - traefik.http.services.sunave-api.loadbalancer.server.port=8080

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    env_file:
      - .env
    labels:
      - traefik.enable=true
      - traefik.http.routers.sunave-web.rule=Host(`${SUNAVE_WEB_HOST}`)
      - traefik.http.routers.sunave-web.entrypoints=websecure
      - traefik.http.routers.sunave-web.tls=true
      - traefik.http.services.sunave-web.loadbalancer.server.port=3000
